{% extends "base.html" %}

{% block title %}Search - {{ config.title }}{% endblock title %}

{% block body %}
<div class="landing-layout">
  <div class="docs-hero">
    <h1>Search Documentation</h1>
    <div class="nav__search" style="display: inline-block; position: relative;">
      <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off" style="width: 400px; font-size: 1rem; padding: 0.75rem 1rem 0.75rem 2.5rem;">
      <div id="search-results" class="search-results" style="width: 400px; left: 0; right: auto;"></div>
    </div>
  </div>
</div>
{% endblock body %}
