id: stats.t_test
version: 0.1.0
kind: standard
network: false
description: Student's t-test on a numeric column - one-sample against a fixed mean, or two-sample comparing the column across the two levels of a grouping column.

inputs:
  data:
    type: file
    format: CSV
    description: Input table containing the value and (optional) grouping columns.
  value_column:
    type: string
    description: Name of the numeric column to test.
  group_column:
    type: string
    description: Optional grouping column with exactly two levels. If provided, a two-sample t-test is run; if empty, a one-sample test against `mu` is run.
  mu:
    type: number
    description: Null-hypothesis mean for the one-sample test. Defaults to 0. Ignored when group_column is set.
  alternative:
    type: string
    description: Alternative hypothesis - one of "two.sided", "less", "greater". Defaults to "two.sided".
  paired:
    type: boolean
    description: Whether to run a paired two-sample test. Requires equal-length groups. Defaults to false.
  conf_level:
    type: number
    description: Confidence level for the reported interval. Defaults to 0.95.

outputs:
  result:
    type: json
    description: Test results - statistic, degrees of freedom, p-value, confidence interval, estimate(s), and the test parameters used.
