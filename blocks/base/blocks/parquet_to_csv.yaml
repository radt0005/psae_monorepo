id: base.parquet_to_csv
version: 0.1.0
kind: standard
network: false
description: Convert a Parquet file to CSV.

inputs:
  table:
    type: file
    format: Parquet
    description: Source Parquet file.
  delimiter:
    type: string
    description: Field delimiter (single ASCII character). Defaults to ",".
  include_header:
    type: boolean
    description: Whether to emit a header row. Defaults to true.

outputs:
  result:
    type: file
    format: CSV
    description: CSV encoding of the input Parquet.
