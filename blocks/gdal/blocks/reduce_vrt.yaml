id: gdal.reduce_vrt
version: 0.1.0
kind: reduce
network: false
description: Build a Virtual Raster from a collection of rasters (fan-in after a map).
entrypoint: reduce_vrt

inputs:
  tiles:
    type: collection
    item_type: file
    format: GeoTIFF
    description: Rasters produced by the upstream mapped blocks.
  resolution:
    type: string
    description: One of highest, lowest, average, or user (default highest).

outputs:
  vrt:
    type: file
    format: VRT
    description: Virtual raster referencing the tile collection.
