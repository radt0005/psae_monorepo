id: gdal.vector_update
version: 0.1.0
kind: standard
network: false
description: Update layer A with features from B (ogr_layer_algebra Update).
entrypoint: vector_update

inputs:
  a:
    type: file
    format: GeoJSON
    description: Base vector layer (A).
  b:
    type: file
    format: GeoJSON
    description: Vector layer whose features overwrite A (B).

outputs:
  vectors:
    type: file
    format: GeoJSON
    description: A updated with B.
