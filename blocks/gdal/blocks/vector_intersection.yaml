id: gdal.vector_intersection
version: 0.1.0
kind: standard
network: false
description: Intersection of two vector layers (ogr_layer_algebra Intersection).
entrypoint: vector_intersection

inputs:
  a:
    type: file
    format: GeoJSON
    description: First vector layer (A).
  b:
    type: file
    format: GeoJSON
    description: Second vector layer (B).

outputs:
  vectors:
    type: file
    format: GeoJSON
    description: Intersection of A and B.
