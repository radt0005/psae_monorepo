id: gdal.retile
version: 0.1.0
kind: standard
network: false
description: Split a raster into a regular grid of smaller tiles (gdal_retile).
entrypoint: retile

inputs:
  source:
    type: file
    format: GeoTIFF
    description: Input raster to retile.
  tile_width:
    type: number
    description: Tile width in pixels (default 256).
  tile_height:
    type: number
    description: Tile height in pixels (default 256).

outputs:
  tiles:
    type: collection
    item_type: file
    format: GeoTIFF
    description: Collection of tile rasters.
