id: gdal.vector_clip
version: 0.1.0
kind: standard
network: false
description: Clip vector layer A by the footprint of vector layer B (ogr_layer_algebra Clip).
entrypoint: vector_clip

inputs:
  a:
    type: file
    format: GeoJSON
    description: Vector layer to clip (A).
  b:
    type: file
    format: GeoJSON
    description: Clip mask vector layer (B).

outputs:
  vectors:
    type: file
    format: GeoJSON
    description: Features of A clipped to B.
