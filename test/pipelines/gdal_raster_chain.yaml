    target_crs: EPSG:32610
    resolution: 0
    resampling: bilinear
    output_format: GTiff
- id: 019f5e05-c517-7d13-80db-a4cf968ffb5c
  name: gdal.translate
  inputs:
  - 019f5e05-c517-7c13-80da-c357a969d2c1
  args:
    output_format: GTiff
    output_type: Byte
    width: 0
    height: 0
    scale_min: 0
    scale_max: 0
- id: 019f5e05-c517-70b8-80dc-3d09b8e4803e
  name: gdal.info
  inputs:
  - 019f5e05-c517-7d13-80db-a4cf968ffb5c
  args:
    compute_stats: true
