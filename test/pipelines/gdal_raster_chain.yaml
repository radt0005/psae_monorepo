id: 019f5e05-c517-704c-80dd-e46a6d105d2e
name: gdal_raster_chain
version: "1.0"
description: Read -> warp -> translate -> info chain
blocks:
- id: 019f5e05-c517-77f8-80d9-3e4ac221a8a4
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster.tif
    format: GeoTIFF
- id: 019f5e05-c517-7c13-80da-c357a969d2c1
  name: gdal.warp
  inputs:
