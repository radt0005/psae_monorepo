id: 019f5e05-c4ff-753d-801d-4059ef22c31f
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019f5e05-c4ff-7245-8018-683a91b7d80c
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019f5e05-c4ff-7401-8019-4929f1f310b2
  name: base.csv_to_parquet
  inputs:
  - 019f5e05-c4ff-7245-8018-683a91b7d80c
  args:
    delimiter: ','
    has_header: true
- id: 019f5e05-c4ff-711f-801a-f884dcc1057b
  name: base.filter_rows
  inputs:
  - 019f5e05-c4ff-7401-8019-4929f1f310b2
  args:
    expression: category = 'A'
- id: 019f5e05-c4ff-7713-801b-2671406a6a53
  name: base.select_columns
  inputs:
  - 019f5e05-c4ff-711f-801a-f884dcc1057b
  args:
    columns: id,value,state
    mode: keep
- id: 019f5e05-c4ff-7ea4-801c-f49f4696aab3
  name: base.aggregate
  inputs:
  - 019f5e05-c4ff-7713-801b-2671406a6a53
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
