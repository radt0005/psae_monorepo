id: 019db076-2448-7231-801d-39f04ab8754a
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019db076-2448-7254-8018-0935fb93e8cb
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019db076-2448-73e3-8019-bfed7fb438df
  name: base.csv_to_parquet
  inputs:
  - 019db076-2448-7254-8018-0935fb93e8cb
  args:
    delimiter: ','
    has_header: true
- id: 019db076-2448-7f95-801a-193ccc5ee7a1
  name: base.filter_rows
  inputs:
  - 019db076-2448-73e3-8019-bfed7fb438df
  args:
    expression: category = 'A'
- id: 019db076-2448-7be6-801b-7c31b9846c16
  name: base.select_columns
  inputs:
  - 019db076-2448-7f95-801a-193ccc5ee7a1
  args:
    columns: id,value,state
    mode: keep
- id: 019db076-2448-7099-801c-a3f0f337007a
  name: base.aggregate
  inputs:
  - 019db076-2448-7be6-801b-7c31b9846c16
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
