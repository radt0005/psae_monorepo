id: 019e3c66-62d8-77a7-801d-9e545e447462
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019e3c66-62d8-79cb-8018-ade5be473187
  name: data.read
  inputs: []
  args:
    uri: /home/pradtke/source/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019e3c66-62d8-75a5-8019-ab0b63dcef8d
  name: base.csv_to_parquet
  inputs:
  - 019e3c66-62d8-79cb-8018-ade5be473187
  args:
    delimiter: ','
    has_header: true
- id: 019e3c66-62d8-775e-801a-15adf5e68ca8
  name: base.filter_rows
  inputs:
  - 019e3c66-62d8-75a5-8019-ab0b63dcef8d
  args:
    expression: category = 'A'
- id: 019e3c66-62d8-71da-801b-82bd3fc7fee1
  name: base.select_columns
  inputs:
  - 019e3c66-62d8-775e-801a-15adf5e68ca8
  args:
    columns: id,value,state
    mode: keep
- id: 019e3c66-62d8-7b79-801c-f501dab84202
  name: base.aggregate
  inputs:
  - 019e3c66-62d8-71da-801b-82bd3fc7fee1
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
