id: 019e3c4a-4a72-71d0-801d-c49e7d5e9c5c
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019e3c4a-4a72-774d-8018-f5d337273a2e
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019e3c4a-4a72-7a73-8019-e2a0a8e08fa5
  name: base.csv_to_parquet
  inputs:
  - 019e3c4a-4a72-774d-8018-f5d337273a2e
  args:
    delimiter: ','
    has_header: true
- id: 019e3c4a-4a72-7ae4-801a-7f5a258ed18b
  name: base.filter_rows
  inputs:
  - 019e3c4a-4a72-7a73-8019-e2a0a8e08fa5
  args:
    expression: category = 'A'
- id: 019e3c4a-4a72-7214-801b-1be09e15cf3f
  name: base.select_columns
  inputs:
  - 019e3c4a-4a72-7ae4-801a-7f5a258ed18b
  args:
    columns: id,value,state
    mode: keep
- id: 019e3c4a-4a72-7b9e-801c-be986737682a
  name: base.aggregate
  inputs:
  - 019e3c4a-4a72-7214-801b-1be09e15cf3f
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
