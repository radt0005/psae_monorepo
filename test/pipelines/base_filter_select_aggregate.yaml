id: 019f47d8-082f-7ac5-801d-c12d68b7c20e
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019f47d8-082f-7191-8018-1dec4e00bfa9
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019f47d8-082f-77ad-8019-524e9f770e2b
  name: base.csv_to_parquet
  inputs:
  - 019f47d8-082f-7191-8018-1dec4e00bfa9
  args:
    delimiter: ','
    has_header: true
- id: 019f47d8-082f-78ae-801a-f931ea4aac35
  name: base.filter_rows
  inputs:
  - 019f47d8-082f-77ad-8019-524e9f770e2b
  args:
    expression: category = 'A'
- id: 019f47d8-082f-7541-801b-de1e0c84c8ea
  name: base.select_columns
  inputs:
  - 019f47d8-082f-78ae-801a-f931ea4aac35
  args:
    columns: id,value,state
    mode: keep
- id: 019f47d8-082f-7d83-801c-bb2d919a7ddd
  name: base.aggregate
  inputs:
  - 019f47d8-082f-7541-801b-de1e0c84c8ea
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
