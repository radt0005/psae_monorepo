id: 019ee02c-c72a-7fb6-801d-c118604266f5
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019ee02c-c72a-7878-8018-60e4dbdaff3c
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019ee02c-c72a-7a38-8019-c268ad61365c
  name: base.csv_to_parquet
  inputs:
  - 019ee02c-c72a-7878-8018-60e4dbdaff3c
  args:
    delimiter: ','
    has_header: true
- id: 019ee02c-c72a-703b-801a-af2e0c22d830
  name: base.filter_rows
  inputs:
  - 019ee02c-c72a-7a38-8019-c268ad61365c
  args:
    expression: category = 'A'
- id: 019ee02c-c72a-7b9b-801b-cb5e3b29ddf5
  name: base.select_columns
  inputs:
  - 019ee02c-c72a-703b-801a-af2e0c22d830
  args:
    columns: id,value,state
    mode: keep
- id: 019ee02c-c72a-7fa1-801c-86af60a731a0
  name: base.aggregate
  inputs:
  - 019ee02c-c72a-7b9b-801b-cb5e3b29ddf5
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
