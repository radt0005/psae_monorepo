id: 019dd04d-079d-734e-801d-45f3aa52cc24
name: base_filter_select_aggregate
version: "1.0"
description: Filter category=A, select columns, aggregate by state
blocks:
- id: 019dd04d-079d-7902-8018-825ea8cdf9ff
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_data.csv
    format: CSV
- id: 019dd04d-079d-7ec4-8019-f379dc8e363a
  name: base.csv_to_parquet
  inputs:
  - 019dd04d-079d-7902-8018-825ea8cdf9ff
  args:
    delimiter: ','
    has_header: true
- id: 019dd04d-079d-7cf8-801a-c9c372d8e582
  name: base.filter_rows
  inputs:
  - 019dd04d-079d-7ec4-8019-f379dc8e363a
  args:
    expression: category = 'A'
- id: 019dd04d-079d-7d29-801b-4586c2362f87
  name: base.select_columns
  inputs:
  - 019dd04d-079d-7cf8-801a-c9c372d8e582
  args:
    columns: id,value,state
    mode: keep
- id: 019dd04d-079d-72e0-801c-c8cffb373919
  name: base.aggregate
  inputs:
  - 019dd04d-079d-7d29-801b-4586c2362f87
  args:
    aggregations: '[{"column": "value", "function": "mean"}]'
    group_by: state
