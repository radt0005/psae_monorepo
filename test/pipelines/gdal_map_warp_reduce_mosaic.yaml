id: 019f47d8-0848-7c3f-80d3-c571b6b46e38
name: gdal_map_warp_reduce_mosaic
version: "1.0"
description: Map raster tiles, reproject each, mosaic back
blocks:
- id: 019f47d8-0848-7bd2-80cf-f2f1048efc59
  name: data.read_collection
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster*.tif
    format: GeoTIFF
    max_items: 10
- id: 019f47d8-0848-797b-80d0-55849aabc39a
  name: gdal.map_raster_tiles
  inputs:
  - 019f47d8-0848-7bd2-80cf-f2f1048efc59
  args: {}
- id: 019f47d8-0848-7993-80d1-a809ac3ba803
  name: gdal.warp
  inputs:
  - 019f47d8-0848-797b-80d0-55849aabc39a
  args:
    target_crs: EPSG:32610
    resolution: 0
    resampling: bilinear
    output_format: GTiff
- id: 019f47d8-0848-70eb-80d2-4a28827158b5
  name: gdal.reduce_mosaic
  inputs:
  - 019f47d8-0848-7993-80d1-a809ac3ba803
  args:
    resampling: nearest
