id: 019dac92-4820-792e-80cc-ba12862b1103
name: gdal_map_warp_reduce_mosaic
version: "1.0"
description: Map raster tiles, reproject each, mosaic back
blocks:
- id: 019dac92-4820-7274-80c8-77008055ef1a
  name: data.read_collection
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster*.tif
    format: GeoTIFF
    max_items: 10
- id: 019dac92-4820-794a-80c9-6e22262864e9
  name: gdal.map_raster_tiles
  inputs:
  - 019dac92-4820-7274-80c8-77008055ef1a
  args: {}
- id: 019dac92-4820-7d6a-80ca-36ae659abb6c
  name: gdal.warp
  inputs:
  - 019dac92-4820-794a-80c9-6e22262864e9
  args:
    target_crs: EPSG:32610
    resolution: 0
    resampling: bilinear
    output_format: GTiff
- id: 019dac92-4820-71bb-80cb-ee8a1a08a2f3
  name: gdal.reduce_mosaic
  inputs:
  - 019dac92-4820-7d6a-80ca-36ae659abb6c
  args:
    resampling: nearest
