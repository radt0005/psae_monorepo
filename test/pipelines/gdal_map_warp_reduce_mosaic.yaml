id: 019db076-2460-7cbc-80cc-aebf0cf8f11e
name: gdal_map_warp_reduce_mosaic
version: "1.0"
description: Map raster tiles, reproject each, mosaic back
blocks:
- id: 019db076-2460-7df1-80c8-fa98e8c445a7
  name: data.read_collection
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster*.tif
    format: GeoTIFF
    max_items: 10
- id: 019db076-2460-79b6-80c9-3a8374101543
  name: gdal.map_raster_tiles
  inputs:
  - 019db076-2460-7df1-80c8-fa98e8c445a7
  args: {}
- id: 019db076-2460-7d7b-80ca-10c8077e8c28
  name: gdal.warp
  inputs:
  - 019db076-2460-79b6-80c9-3a8374101543
  args:
    target_crs: EPSG:32610
    resolution: 0
    resampling: bilinear
    output_format: GTiff
- id: 019db076-2460-7ff8-80cb-00c39f3eb6d7
  name: gdal.reduce_mosaic
  inputs:
  - 019db076-2460-7d7b-80ca-10c8077e8c28
  args:
    resampling: nearest
