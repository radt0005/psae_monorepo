id: 019dd04d-07e1-74e4-80cc-7007e48e99f2
name: gdal_map_warp_reduce_mosaic
version: "1.0"
description: Map raster tiles, reproject each, mosaic back
blocks:
- id: 019dd04d-07e0-727b-80c8-d8148fde4c6e
  name: data.read_collection
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_raster*.tif
    format: GeoTIFF
    max_items: 10
- id: 019dd04d-07e0-77f7-80c9-287246b8f15e
  name: gdal.map_raster_tiles
  inputs:
  - 019dd04d-07e0-727b-80c8-d8148fde4c6e
  args: {}
- id: 019dd04d-07e1-7ac2-80ca-9a18301edeb0
  name: gdal.warp
  inputs:
  - 019dd04d-07e0-77f7-80c9-287246b8f15e
  args:
    target_crs: EPSG:32610
    resolution: 0
    resampling: bilinear
    output_format: GTiff
- id: 019dd04d-07e1-77e4-80cb-91725e0459c6
  name: gdal.reduce_mosaic
  inputs:
  - 019dd04d-07e1-7ac2-80ca-9a18301edeb0
  args:
    resampling: nearest
