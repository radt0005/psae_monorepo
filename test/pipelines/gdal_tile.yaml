id: 019f5c5d-fe36-782e-8052-93d3dc0b0c29
name: gdal_tile
version: "1.0"
description: Translate to Byte then generate XYZ map tiles
blocks:
- id: 019f5c5d-fe36-74db-804f-038ff1ad583b
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster.tif
