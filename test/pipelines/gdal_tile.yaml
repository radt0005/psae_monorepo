id: 019f5e17-50c8-7e4c-8052-f41b9993b6a7
name: gdal_tile
version: "1.0"
description: Translate to Byte then generate XYZ map tiles
blocks:
- id: 019f5e17-50c8-7c83-804f-468425d574a5
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster.tif
