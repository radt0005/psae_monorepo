id: 019f5e05-c505-74b5-8052-c765d65edf4f
name: gdal_tile
version: "1.0"
description: Translate to Byte then generate XYZ map tiles
blocks:
- id: 019f5e05-c505-7595-804f-bdb39b0a9a65
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_raster.tif
    format: GeoTIFF
- id: 019f5e05-c505-7ac1-8050-f2dddf2bdf6b
  name: gdal.translate
  inputs:
  - 019f5e05-c505-7595-804f-bdb39b0a9a65
  args:
    output_format: GTiff
    output_type: Byte
    width: 0
    height: 0
    scale_min: 0
    scale_max: 0
- id: 019f5e05-c505-7156-8051-f7ffcb08b7f8
  name: gdal.tile
  inputs:
  - 019f5e05-c505-7ac1-8050-f2dddf2bdf6b
  args:
    zoom: "0-2"
    profile: mercator
    resampling: average
