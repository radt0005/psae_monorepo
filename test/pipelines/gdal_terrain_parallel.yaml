id: 019ee02c-c752-72e2-808c-6acf10113da5
name: gdal_terrain_parallel
version: "1.0"
description: 'Parallel terrain analysis: hillshade + slope + aspect from single DEM'
blocks:
- id: 019ee02c-c752-7f2e-8088-8c3dbbcf5935
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019ee02c-c752-76f7-8089-0e674d5cd568
  name: gdal.hillshade
  inputs:
  - 019ee02c-c752-7f2e-8088-8c3dbbcf5935
  args:
    azimuth: 315
    altitude: 45
    z_factor: 1
    scale: 1
    multidirectional: false
- id: 019ee02c-c752-75de-808a-2deaa4d99b40
  name: gdal.slope
  inputs:
  - 019ee02c-c752-7f2e-8088-8c3dbbcf5935
  args:
    scale: 1
    slope_format: degree
- id: 019ee02c-c752-7409-808b-726e9d4235bc
  name: gdal.aspect
  inputs:
  - 019ee02c-c752-7f2e-8088-8c3dbbcf5935
  args:
    zero_for_flat: false
    trigonometric: false
