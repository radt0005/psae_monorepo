id: 019f5e05-c50e-74ff-8093-e95761440b3c
name: gdal_terrain_parallel
version: "1.0"
description: 'Parallel terrain analysis: hillshade + slope + aspect from single DEM'
blocks:
- id: 019f5e05-c50e-7039-808f-f07da1d29ccb
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019f5e05-c50e-777b-8090-1fd036dab4ec
  name: gdal.hillshade
  inputs:
  - 019f5e05-c50e-7039-808f-f07da1d29ccb
  args:
    azimuth: 315
    altitude: 45
    z_factor: 1
    scale: 1
    multidirectional: false
- id: 019f5e05-c50e-7ef7-8091-9ba5db20d3b1
  name: gdal.slope
  inputs:
  - 019f5e05-c50e-7039-808f-f07da1d29ccb
  args:
    scale: 1
    slope_format: degree
- id: 019f5e05-c50e-716b-8092-53c3f864afd0
  name: gdal.aspect
  inputs:
  - 019f5e05-c50e-7039-808f-f07da1d29ccb
  args:
    zero_for_flat: false
    trigonometric: false
