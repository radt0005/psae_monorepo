id: 019db076-2457-71b6-808c-59d53ded0b50
name: gdal_terrain_parallel
version: "1.0"
description: 'Parallel terrain analysis: hillshade + slope + aspect from single DEM'
blocks:
- id: 019db076-2457-7e72-8088-b57428c5d89d
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019db076-2457-7e56-8089-f3788b8095d0
  name: gdal.hillshade
  inputs:
  - 019db076-2457-7e72-8088-b57428c5d89d
  args:
    azimuth: 315
    altitude: 45
    z_factor: 1
    scale: 1
    multidirectional: false
- id: 019db076-2457-779b-808a-a748f5b2f7f0
  name: gdal.slope
  inputs:
  - 019db076-2457-7e72-8088-b57428c5d89d
  args:
    scale: 1
    slope_format: degree
- id: 019db076-2457-7492-808b-429a5e484dfd
  name: gdal.aspect
  inputs:
  - 019db076-2457-7e72-8088-b57428c5d89d
  args:
    zero_for_flat: false
    trigonometric: false
