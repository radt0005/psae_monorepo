id: 019f47d8-084a-7738-80e5-6539441cf424
name: gdal_dem_contour_reproject
version: "1.0"
description: DEM -> contour lines -> reproject to UTM
blocks:
- id: 019f47d8-084a-7164-80e2-1d9917961f77
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019f47d8-084a-76a2-80e3-7b99d3212863
  name: gdal.contour
  inputs:
  - 019f47d8-084a-7164-80e2-1d9917961f77
  args:
    band: 1
    interval: 100
    base: 0
    field_name: elev
- id: 019f47d8-084a-74fb-80e4-31ed22555c74
  name: gdal.vector_translate
  inputs:
  - 019f47d8-084a-76a2-80e3-7b99d3212863
  args:
    output_format: GeoJSON
    target_crs: EPSG:32610
    where: ''
    sql: ''
