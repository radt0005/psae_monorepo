id: 019dd04d-07e7-791c-80de-5f44a83a29e1
name: gdal_dem_contour_reproject
version: "1.0"
description: DEM -> contour lines -> reproject to UTM
blocks:
- id: 019dd04d-07e7-7d4e-80db-780348fa8e41
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/UMaine/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019dd04d-07e7-7305-80dc-107a1a092027
  name: gdal.contour
  inputs:
  - 019dd04d-07e7-7d4e-80db-780348fa8e41
  args:
    band: 1
    interval: 100
    base: 0
    field_name: elev
- id: 019dd04d-07e7-7da1-80dd-ca9586b72ddb
  name: gdal.vector_translate
  inputs:
  - 019dd04d-07e7-7305-80dc-107a1a092027
  args:
    output_format: GeoJSON
    target_crs: EPSG:32610
    where: ''
    sql: ''
