id: 019f5e05-c519-7ad4-80e5-6a54b1a382ed
name: gdal_dem_contour_reproject
version: "1.0"
description: DEM -> contour lines -> reproject to UTM
blocks:
- id: 019f5e05-c519-7e9d-80e2-1fff5331c08d
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019f5e05-c519-7766-80e3-9486cf60986d
  name: gdal.contour
  inputs:
  - 019f5e05-c519-7e9d-80e2-1fff5331c08d
  args:
    band: 1
    interval: 100
    base: 0
    field_name: elev
- id: 019f5e05-c519-79ec-80e4-793f4a0ed0d7
  name: gdal.vector_translate
  inputs:
  - 019f5e05-c519-7766-80e3-9486cf60986d
  args:
    output_format: GeoJSON
    target_crs: EPSG:32610
    where: ''
    sql: ''
