id: 019dac92-4823-7fff-80de-1cf76c339f1a
name: gdal_dem_contour_reproject
version: "1.0"
description: DEM -> contour lines -> reproject to UTM
blocks:
- id: 019dac92-4823-7a95-80db-ae3e42fcf1e4
  name: data.read
  inputs: []
  args:
    uri: /home/krbundy/GitHub/psae_monorepo/test/fixtures/test_dem.tif
    format: GeoTIFF
- id: 019dac92-4823-70b2-80dc-8b0e6dcf109c
  name: gdal.contour
  inputs:
  - 019dac92-4823-7a95-80db-ae3e42fcf1e4
  args:
    band: 1
    interval: 100
    base: 0
    field_name: elev
- id: 019dac92-4823-7511-80dd-4b0f0ee38124
  name: gdal.vector_translate
  inputs:
  - 019dac92-4823-70b2-80dc-8b0e6dcf109c
  args:
    output_format: GeoJSON
    target_crs: EPSG:32610
    where: ''
    sql: ''
