{% extends "base.html" %}

{% block page_title %}{{ page.title }} — {{ config.title }}{% endblock page_title %}

{% block content %}
<div style="height: 64px;"></div>
<section class="section">
  <div class="container" style="max-width: 800px;">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="hero__subtitle">{{ page.description }}</p>
    {% endif %}
    <div class="page-content">
      {{ page.content | safe }}
    </div>
  </div>
</section>
{% endblock content %}
