{% extends "base.html" %}

{% block page_title %}{{ page.title }} — Features — {{ config.title }}{% endblock page_title %}

{% block content %}
<div style="height: 64px;"></div>
<section class="section">
  <div class="container" style="max-width: 800px;">
    <div class="section-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p>{{ page.description }}</p>
      {% endif %}
    </div>
    <div class="page-content">
      {{ page.content | safe }}
    </div>
    <div class="text-center" style="margin-top: 3rem;">
      <a href="{{ get_url(path='@/features/_index.md') }}" class="btn btn--outline">&larr; All Features</a>
    </div>
  </div>
</section>
{% endblock content %}
