# Local-dev services for the Spade web UI.
#
# Production deploys swap these for managed services (RDS, S3, etc.) but the
# wire protocols are identical, so the app code does not change.
#
# Usage:
#   docker compose up -d        # start everything
#   docker compose down -v      # tear down + remove volumes (destructive)

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: spade
      POSTGRES_PASSWORD: spade
      POSTGRES_DB: spade
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spade -d spade"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spade
      MINIO_ROOT_PASSWORD: spadespade
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # admin console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Existing infra used by the worker — keep it in this file so the whole
  # stack comes up with one command.
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: spade
      RABBITMQ_DEFAULT_PASS: spade

volumes:
  postgres-data:
  minio-data:
